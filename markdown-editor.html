<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Markdown Editor</title>

<!-- Markdown парсер -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Подсветка синтаксиса -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>
<!-- Поддержка GFM (таблицы, чеклисты) -->
<script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1e1e1e; color: #d4d4d4; height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    background: #252526; padding: 10px 20px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #3c3c3c;
  }
  header h1 { font-size: 18px; color: #ff9500; }
  .toolbar button {
    background: #0e639c; color: white; border: none;
    padding: 6px 12px; margin-left: 6px; border-radius: 4px;
    cursor: pointer; font-size: 13px;
  }
  .toolbar button:hover { background: #1177bb; }
  .container {
    flex: 1; display: flex; overflow: hidden;
  }
  .panel {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid #3c3c3c;
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    background: #2d2d30; padding: 8px 16px;
    font-size: 13px; color: #888; text-transform: uppercase;
    border-bottom: 1px solid #3c3c3c;
  }
  #editor {
    flex: 1; width: 100%; background: #1e1e1e; color: #d4d4d4;
    border: none; padding: 16px; font-family: "Consolas", monospace;
    font-size: 14px; resize: none; outline: none; line-height: 1.6;
  }
  #preview {
    flex: 1; padding: 20px; overflow-y: auto;
    background: #1e1e1e; line-height: 1.6;
  }
  /* Стили для markdown */
  #preview h1, #preview h2, #preview h3 { color: #ff9500; margin: 16px 0 8px; }
  #preview p { margin: 8px 0; }
  #preview code {
    background: #2d2d30; padding: 2px 6px; border-radius: 3px;
    font-family: "Consolas", monospace; color: #ce9178;
  }
  #preview pre {
    background: #2d2d30; padding: 12px; border-radius: 4px;
    overflow-x: auto; margin: 12px 0;
  }
  #preview pre code { background: none; padding: 0; color: #d4d4d4; }
  #preview blockquote {
    border-left: 3px solid #ff9500; padding-left: 12px;
    color: #999; margin: 12px 0;
  }
  #preview table { border-collapse: collapse; margin: 12px 0; }
  #preview th, #preview td {
    border: 1px solid #3c3c3c; padding: 6px 12px;
  }
  #preview th { background: #2d2d30; }
  #preview a { color: #4fc1ff; }
  #preview img { max-width: 100%; }
  #preview ul, #preview ol { margin: 8px 0 8px 24px; }
  #preview input[type="checkbox"] { margin-right: 6px; }
</style>
</head>
<body>

<header>
  <h1>📝 Markdown Editor</h1>
  <div class="toolbar">
    <button onclick="insertText('**', '**')" title="Ctrl+B">B</button>
    <button onclick="insertText('*', '*')" title="Ctrl+I">I</button>
    <button onclick="insertText('`', '`')">&lt;/&gt;</button>
    <button onclick="copyMarkdown()">📋 MD</button>
    <button onclick="copyHTML()">📋 HTML</button>
    <button onclick="downloadMD()">💾 Скачать</button>
  </div>
</header>

<div class="container">
  <div class="panel">
    <div class="panel-header">Markdown</div>
    <textarea id="editor" placeholder="Пишите Markdown здесь..."></textarea>
  </div>
  <div class="panel">
    <div class="panel-header">Preview</div>
    <div id="preview"></div>
  </div>
</div>

<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');

  // Настройка marked + highlight.js
  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    gfm: true, breaks: true
  });

  // Рендер
  function render() {
    preview.innerHTML = marked.parse(editor.value);
    localStorage.setItem('md-content', editor.value);
  }

  // Восстановление из localStorage
  editor.value = localStorage.getItem('md-content') ||
`# Привет, Markdown!

Это **live preview** редактор.

## Возможности
- [x] Заголовки, списки, ссылки
- [x] Таблицы и чеклисты (GFM)
- [x] Подсветка синтаксиса

\`\`\`python
def hello():
    print("Hello, world!")
\`\`\`

| Колонка 1 | Колонка 2 |
|-----------|-----------|
| A         | B         |

> Цитата для примера`;

  editor.addEventListener('input', render);
  render();

  // Вставка текста (для кнопок B, I, code)
  function insertText(before, after) {
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const selected = editor.value.substring(start, end) || 'текст';
    editor.setRangeText(before + selected + after, start, end, 'select');
    editor.focus();
    render();
  }

  // Копирование
  function copyMarkdown() {
    navigator.clipboard.writeText(editor.value);
    flash('Markdown скопирован!');
  }
  function copyHTML() {
    navigator.clipboard.writeText(preview.innerHTML);
    flash('HTML скопирован!');
  }
  function downloadMD() {
    const blob = new Blob([editor.value], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'document.md';
    a.click();
  }
  function flash(msg) {
    const el = document.createElement('div');
    el.textContent = msg;
    el.style.cssText = 'position:fixed;top:20px;right:20px;background:#ff9500;color:#000;padding:10px 16px;border-radius:4px;z-index:999';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }

  // Горячие клавиши
  editor.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'b') { e.preventDefault(); insertText('**', '**'); }
    if (e.ctrlKey && e.key === 'i') { e.preventDefault(); insertText('*', '*'); }
    if (e.key === 'Tab') {
      e.preventDefault();
      insertText('    ', '');
    }
  });
</script>
</body>
</html>
